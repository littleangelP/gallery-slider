<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>

<header class="header">

<div class="header-content">

<h1>🏆 Sports Gallery</h1>

</a>

</div>

</header>

<section class="gallery-section">

<div class="section-header">

<h2>All Sports Photos</h2>

</div>

<div class="gallery-grid">

<img src="https://raw.githubusercontent.com/littleangelP/gallery-slider/main/1%20(1).jpeg" onclick="openImage(this.src)">

<img src="https://raw.githubusercontent.com/littleangelP/gallery-slider/main/1%20(2).jpeg" onclick="openImage(this.src)">

<img src="https://raw.githubusercontent.com/littleangelP/gallery-slider/main/1%20(3).jpeg" onclick="openImage(this.src)">

<img src="https://raw.githubusercontent.com/littleangelP/gallery-slider/main/1%20(4).jpeg" onclick="openImage(this.src)">

<img src="https://raw.githubusercontent.com/littleangelP/gallery-slider/main/1%20(7).jpeg" onclick="openImage(this.src)">

</div>

<!-- ================= LIGHTBOX ================= -->

<div id="lightbox" class="lightbox">

<span class="close-btn" onclick="closeImage()">&times;</span>

<span class="prev-btn" onclick="prevImage()">❮</span>

<img id="lightbox-img" src="" alt="Sports Gallery Image">

<span class="next-btn" onclick="nextImage()">❯</span>

</div>

<footer class="footer">

<p>© 2026 Little Angel's Public School | Sports Gallery</p>

</footer>
